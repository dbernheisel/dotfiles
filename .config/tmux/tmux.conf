set -g  default-terminal 'tmux-256color'
set-environment -gru TERMINFO
set -ga terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-overrides ',xterm*:sitm=\E[3m'
set -g  mouse on
set -as terminal-features 'xterm*:RGB:clipboard:focus:hyperlinks:sixel:strikethrough:usstyle:title:sync'
setw -g clock-mode-style 12


# act like vim
set -g set-clipboard on
setw -g mode-keys vi
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# act like GNU screen
unbind C-b
set -g prefix C-a

# start windows numbers at 1
setw -g pane-base-index 1
set -g base-index 1

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# renumber windows after closing one
set -g renumber-windows on

if-shell "uname | grep -q Darwin" \
  { source-file ~/.config/tmux/tmux-mac.conf } \
  { source-file ~/.config/tmux/tmux-linux.conf }

source-file ~/.config/tmux/theme.conf

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# setup 'v' to begin selection like VIM
bind-key -T copy-mode-vi v \
  send -X rectangle-off \; send -X begin-selection

bind-key -T copy-mode-vi 'C-v' \
  send -X rectangle-on \; send -X begin-selection

bind-key -T copy-mode-vi Escape {
  if-shell -F "#{selection_present}" \
    { send-keys -X clear-selection } \
    { send-keys -X cancel }
}

# focus pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# move/swap pane position
bind H swap-pane -t '{left-of}'
bind J swap-pane -t '{down-of}'
bind K swap-pane -t '{up-of}'
bind L swap-pane -t '{right-of}'

# logical splits
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind b break-pane -d

# jump to window by number
bind 1 select-window -t:1
bind 2 select-window -t:2
bind 3 select-window -t:3
bind 4 select-window -t:4
bind 5 select-window -t:5
bind 6 select-window -t:6
bind 7 select-window -t:7
bind 8 select-window -t:8
bind 9 select-window -t:9

# next/prev window
bind n next-window
bind p previous-window

# reorder window under prefix
bind Left swap-window -t -1\; select-window -t -1
bind Right swap-window -t +1\; select-window -t +1

# cycle layouts
bind Space next-layout

# zoom pane
bind f resize-pane -Z

# sync input to all panes
bind s setw synchronize-panes

# kill window
bind X kill-window

# rename window
bind , command-prompt -I "#W" "rename-window '%%'"

# session picker
bind Tab choose-tree -Zs

# resize panes
bind -r C-h resize-pane -L 2
bind -r C-j resize-pane -D 2
bind -r C-k resize-pane -U 2
bind -r C-l resize-pane -R 2

# Faster reload
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# Plugins
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -sg escape-time 0

##### tmux-sensible has these options
# set -g utf8 on
# set g status-utf8 on
